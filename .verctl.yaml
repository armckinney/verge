version: 1

ecosystem: v-semver

format:
  input: auto
  output: auto
  tagPrefix: v
  sequenceInterpreter: auto

sources:
  precedence:
    - git-tags
  git-tags:
    enabled: true
    fetch: false
    includePrerelease: true
    ecosystemParsing: v-semver

sequence:
  hashLength: 7
  allowContentHash: true
  ghBuildPattern: "gh-"

rules:
  prereleaseStage: dev
  allowMajorZeroBreaking: true
  defaultBump: patch

autoBump:
  conventionalCommits: true
  breakingTokens:
    - "BREAKING CHANGE"
    - "!:"
