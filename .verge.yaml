# Verge CLI Self-Versioning Configuration
# Configures Verge to manage its own releases and test pseudo-versions using the Go module standard format.

version_type: vsemver

default:
  bump_kind: prerelease
  prerelease_stage: dev

sequence:
  type: increment

provider:
  type: ghrelease
  ghrelease:
    owner: "armckinney"
    repo: "verge"
    include_prerelease: true
    include_drafts: false
